<section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Financial Report</h1>
        </div>
        <div class="col-sm-6">
        </div>
      </div>
    </div>
    <!-- /.container-fluid -->
  </section>
  
  <!-- Main content -->
  <section class="content">
    <!-- Default box -->
    <div class="overlay-spinner" *ngIf="isLoading">
      <!-- *ngIf="isLoading" -->
      <mat-spinner></mat-spinner>
    </div>
  
    <form class="container-fluid" [formGroup]="form">
      <div class="card">
        <div class="card-body">
          <div class="row">

            <div class="col-md-6">
                <div [formGroup]="storeForm">
                    <mat-form-field class="example-full-width" appearance="fill" class="w-100">
                        <mat-label>Select store</mat-label>
                        <input type="text"
                               placeholder="Select store"
                               aria-label="Select store"
                               matInput
                               [matAutocomplete]="auto"
                               formControlName="store_name"
                               >
                        <mat-autocomplete autoActiveFirstOption #auto="matAutocomplete">
                          <mat-option *ngFor="let store of stores" [value]="store.store_name" (click)="addStore(store)" [class.checked]="getStoreInSelectedStore(store.store_id)">
                            {{store.store_name}}
                          </mat-option>
                        </mat-autocomplete>
                    </mat-form-field>
                </div>
            </div>

                <div class="col-md-6 col-xl-3 mb-3">
                    <mat-form-field class="w-100">
                        <mat-label>From Date</mat-label>
                        <input matInput [matDatepicker]="picker1" formControlName="from_date">
                        <mat-hint>MM/DD/YYYY</mat-hint>
                        <mat-datepicker-toggle matIconSuffix [for]="picker1"></mat-datepicker-toggle>
                        <mat-datepicker #picker1></mat-datepicker>
                    </mat-form-field>
                </div>

                <div class="col-md-6 col-xl-3 mb-3">
                    <mat-form-field class="w-100">
                        <mat-label>To Date</mat-label>
                        <input matInput [matDatepicker]="picker2" formControlName="to_date">
                        <mat-hint>MM/DD/YYYY</mat-hint>
                        <mat-datepicker-toggle matIconSuffix [for]="picker2"></mat-datepicker-toggle>
                        <mat-datepicker #picker2 color="primary"></mat-datepicker>
                    </mat-form-field>
                </div>

                <div class="col-12 mb-3" *ngIf="selectedStores.length">
                    <h2>Stores</h2>
                    <ul class="ml-0 pl-0">
                        <li 
                        *ngFor="let store of selectedStores"
                        class="card d-flex flex-row ml-0 px-3 py-2 align-items-center mb-1">
                            <h3 class="mb-0">{{store.store_name}} (Id: {{store.store_id}})</h3> <button class="btn btn-sm btn-danger ml-auto" (click)="removeStore(store)">Remove</button>
                        </li>
                    </ul>
                </div>

                <div class="col-12 mb-3" *ngIf="selectedStores.length == 0">
                    <div class="card">
                        <h2 class="text-center mb-0 py-5">All Stores are selected</h2>
                    </div>
                </div>

                <div class="col-12">
                    <button class="btn btn-primary" (click)="generateReport()">
                        Generate Report
                    </button>
                </div>
          </div>
        </div>
      </div>
  
      
  
    </form>
  
    <!-- /.card -->
  </section>
  <!-- /.content -->
