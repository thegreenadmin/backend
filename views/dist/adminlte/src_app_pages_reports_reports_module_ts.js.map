<section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Access Analytics</h1>
        </div>
        <div class="col-sm-6">
        </div>
      </div>
    </div>
    <!-- /.container-fluid -->
  </section>
  
  <!-- Main content -->
  <section class="content">
    <!-- Default box -->
    <div class="overlay-spinner" *ngIf="isLoading">
      <!-- *ngIf="isLoading" -->
      <mat-spinner></mat-spinner>
    </div>
  
    <form class="container-fluid" [formGroup]="form">
      <div class="card">
        <div class="card-body">
          <div class="row">

                <div class="col-md-6 col-xl-3 mb-3">
                    <mat-form-field class="w-100">
                        <mat-label>Country</mat-label>
                        <mat-select formControlName="country">
                          <mat-option *ngFor="let country of countries" [value]="country.name">
                            {{country.name}}
                          </mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>

                <div class="col-md-6 col-xl-3 mb-3">
                    <mat-form-field class="w-100">
                        <mat-label>State</mat-label>
                        <mat-select formControlName="state">
                          <mat-option *ngFor="let state of states" [value]="state.name">
                            {{state.name}}
                          </mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>

                <div class="col-md-6 col-xl-3 mb-3">
                    <mat-form-field class="w-100">
                        <mat-label>From Date</mat-label>
                        <input matInput [matDatepicker]="picker1" formControlName="from_date">
                        <mat-hint>MM/DD/YYYY</mat-hint>
                        <mat-datepicker-toggle matIconSuffix [for]="picker1"></mat-datepicker-toggle>
                        <mat-datepicker #picker1></mat-datepicker>
                    </mat-form-field>
                </div>

                <div class="col-md-6 col-xl-3 mb-3">
                    <mat-form-field class="w-100">
                        <mat-label>To Date</mat-label>
                        <input matInput [matDatepicker]="picker2" formControlName="to_date">
                        <mat-hint>MM/DD/YYYY</mat-hint>
                        <mat-datepicker-toggle matIconSuffix [for]="picker2"></mat-datepicker-toggle>
                        <mat-datepicker #picker2 color="primary"></mat-datepicker>
                    </mat-form-field>
                </div>

                <div class="col-12">
                    <button class="btn btn-primary" (click)="generateReport()">
                      Generate Report
                    </button>
                </div>
          </div>
        </div>
      </div>
  
      
  
    </form>
  
    <!-- /.card -->
  </section>
  <!-- /.content -->
