<!-- Content Header (Page header) -->
<section class="content-header">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-sm-6">
        <h1>User details</h1>
      </div>
      <div class="btn-group ml-auto" *ngIf="user">
        <button class="btn btn-primary" *ngIf="user.is_blocked" (click)="unblockUser()">
            Unblock User
        </button>
        <button class="btn btn-danger" *ngIf="!user.is_blocked" (click)="blockUser()">
            Block User
        </button>
    </div>
    </div>
  </div>
  <!-- /.container-fluid -->
</section>

<!-- Main content -->
<section class="content">
  <!-- Default box -->
  <div class="container-fluid">
    <div class="card p-4">
      <form class="card-head w-100">

        <div class="row" *ngIf="user">

          <div class="col-md-6  mt-1">
            <div class="key">First Name</div>
            <input class="form-control" type="text" [value]="user.first_name" readonly>
          </div>

          <div class="col-md-6 mt-1">
            <div class="key">Last Name</div>
            <input class="form-control" type="text" [value]="user.last_name" readonly>
          </div>

          <div class="col-md-6 mt-2">
            <div class="key">Nick Name</div>
            <input class="form-control" type="text" [value]="user.nick_name" readonly>
          </div>

          <div class="col-md-6 mt-2">
            <div class="key">Email</div>
            <input class="form-control" type="email" [value]="user.email" readonly>
          </div>

          <div class="col-md-6 mt-2">
            <div class="key">Dialing Code</div>
            <input class="form-control" type="text" [value]="user.phone_code" readonly>
          </div>

          <div class="col-md-6 mt-2">
            <div class="key">Phone</div>
            <input class="form-control" type="tel" [value]="user.phone" readonly>
          </div>

          <div class="col-12 mt-2">
            <mat-divider></mat-divider>
          </div>

          <div class="card" style="background-color: #f9f9f9; padding: 20px; width: 100%; ">
            <div class="card-body">
              <h2>Address</h2>
              <table class="table">
                <tbody>
                  <tr>
                    <th>Line-1</th>
                    <th>Line-2</th>
                    <th>City</th>
                    <th>State</th>
                    <th>Zip</th>
                    <th>Country</th>
                   
                  </tr>
                  <tr *ngFor="let address of user.user_addresses; index as i">
                    
                     <td>{{ address.address_line_1 }}</td>
                    <td>{{ address.address_line_2 }}</td>
                    <td>{{ address.city }}</td>
                    <td>{{ address.state}}</td>
                    <td>{{ address.postal_code }}</td>
                    <td>{{ address.country }}</td>
                  
                    <!-- <td>
                    
                    </td> -->
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>

      </form>
    </div>

  </div>
  <!-- /.card -->
</section>
<!-- /.content -->
