<!-- Content Header (Page header) -->
<section class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1>Create Product (Bulk)</h1>
            </div>
            <div class="col-sm-6">
                <div class="float-sm-right">
                    <a class="btn btn-warning" href="/assets/files/new_product.xlsx" download="product">Download XLSX file</a>
                </div>
            </div>
        </div>
    </div>
    <!-- /.container-fluid -->
</section>

<!-- Main content -->
<section class="content">
    <!-- Default box -->
    <div class="overlay-spinner" *ngIf="isLoading">
        <mat-spinner></mat-spinner>
    </div>

    <form class="container-fluid">
        <div class="card">
            <div class="card-body">
                <div class="row">

                    <div class="col-md-6">
                        <input type="hidden" formControlName="store_id" [(ngModel)]="storeId" [value]="storeId">
                        <div [formGroup]="storeForm" class="w-100">
                            <mat-form-field class="example-full-width" appearance="fill" class="w-100">
                                <mat-label>Select store</mat-label>
                                <input type="text"
                                       placeholder="Select store"
                                       aria-label="Select store"
                                       matInput
                                       [matAutocomplete]="auto"
                                       formControlName="store_name"
                                       >
                                <mat-autocomplete autoActiveFirstOption #auto="matAutocomplete">
                                  <mat-option *ngFor="let store of stores" [value]="store.store_name" (click)="changeStore(store)" [class.checked]="store.store_id == storeId">
                                    {{store.store_name}}
                                  </mat-option>
                                </mat-autocomplete>
                            </mat-form-field>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <br>
                        <input type="file" #file accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel">
                    </div>

                    <div class="col-12 mt-3">
                        <button class="btn btn-primary" (click)="createBulkProducts(file.files)">Create Products</button>
                    </div>
                </div>
            </div>
        </div>
    </form>



    <!-- /.card -->
</section>
<!-- /.content -->
