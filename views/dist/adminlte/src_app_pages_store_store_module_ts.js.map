<!-- Content Header (Page header) -->
<section class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1>Create stores (bulk)</h1>
            </div>
            <div class="col-sm-6">
                <div class="float-sm-right">
                    <a class="btn btn-warning" href="/assets/files/new_store.xlsx" download="store">Download XLSX file</a>
                </div>
            </div>
        </div>
    </div>
    <!-- /.container-fluid -->
</section>

<!-- Main content -->
<section class="content">
    <!-- Default box -->
    <div class="overlay-spinner" *ngIf="isLoading">
        <mat-spinner></mat-spinner>
    </div>

    <form class="container-fluid">
        <div class="card">
            <div class="card-body">
                <div class="row">

                    <div class="col-md-4">
                        <input type="file" #file accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel">
                    </div>

                    <div class="col-12 mt-3">
                        <button class="btn btn-primary" (click)="createBulkStores(file.files)">Create Stores</button>
                    </div>
                </div>
            </div>
        </div>
    </form>



    <!-- /.card -->
</section>
<!-- /.content -->
