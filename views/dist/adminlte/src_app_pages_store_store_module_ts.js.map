<!-- Content Header (Page header) -->
<section class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1>Create Store</h1>
            </div>
            <div class="col-sm-6">
                <!-- <ol class="breadcrumb float-sm-right">
                    <li class="breadcrumb-item"><a href="#">Home</a></li>
                    <li class="breadcrumb-item active">Blank Page</li>
                </ol> -->
            </div>
        </div>
    </div>
    <!-- /.container-fluid -->
</section>

<!-- Main content -->
<section class="content">
    <!-- Default box -->
    <div class="overlay-spinner" *ngIf="isLoading">
        <mat-spinner></mat-spinner>
    </div>

    <form class="container-fluid" [formGroup]="storeForm" autocomplete="off">
        <div class="card">
            <div class="card-body">
                <div class="row">


                    <div class="col-md-6">
                        <mat-form-field class="w-100">
                            <mat-label>Store Name</mat-label>
                            <input matInput placeholder="Enter Store" formControlName="store_name">
                        </mat-form-field>
                    </div>

                    <div class="col-md-6">
                        <mat-form-field class="w-100">
                            <mat-label>EIN</mat-label>
                            <input matInput placeholder="Enter EIN" formControlName="store_ein" maxlength="11">
                        </mat-form-field>
                    </div>

                    <div class="col-md-6 mb-4">

                        <mat-label>Image</mat-label> <br>
                        <input type="hidden" formControlName="logo_url" [(ngModel)]="logoUrl">
                        <input type="file" class="file-upload" (change)="fileUpload($event.target.files)">

                    </div>

                    <div class="col-md-6 mb-4">

                        <mat-label>Logo</mat-label> <br>
                        <input type="hidden" formControlName="image_url" [(ngModel)]="imageUrl">
                        <input type="file" class="file-upload" (change)="logoUpload($event.target.files)">

                    </div>

                    <div class="col-md-6">
                        <mat-form-field class="w-100">
                            <mat-label>Nick Name</mat-label>
                            <input matInput placeholder="Enter Nick Name" formControlName="store_nick_name">
                        </mat-form-field>
                    </div>

                    <div class="col-md-6">
                        <mat-form-field class="w-100">
                            <mat-label>Email</mat-label>
                            <input matInput placeholder="Enter Email" formControlName="store_email">
                        </mat-form-field>
                    </div>

                    <div class="col-md-6">
                        <mat-form-field class="w-100">
                            <mat-label>Country Code</mat-label>
                            <mat-select formControlName="store_phone_code" [value]="+1">
                                <mat-option *ngFor="let country of countryList;" [value]="country.code">{{country.code}} {{country.name}}</mat-option>
                            </mat-select>
                        </mat-form-field>
                    </div>

                    <div class="col-md-6">
                        <mat-form-field class="w-100">
                            <mat-label>Phone</mat-label>
                            <input type="number" matInput placeholder="Enter Phone" formControlName="store_phone" maxlength="13">
                        </mat-form-field>
                    </div>

                    <div class="col-12">
                        <h1>Address</h1>

                    </div>

                    <div class="col-12" [formGroup]="addressSearchForm">
                        <mat-form-field appearance="fill" class="w-100">
                            <mat-label>Search Address </mat-label>
                            <input type="text"
                                   placeholder="Enter address"
                                   aria-label="Enter address"
                                   matInput
                                   [matAutocomplete]="auto"
                                   formControlName="change_address"
                                   autocomplete="off" 
                                   >
                            <mat-autocomplete autoActiveFirstOption #auto="matAutocomplete">
                              <mat-option *ngFor="let address of addresses" [value]="address.description" (click)="changeAddress(address.place_id)">
                                {{address.description}}
                              </mat-option>
                            </mat-autocomplete>
                        </mat-form-field>
                    </div>

                    <div class="col-md-6">
                        <mat-form-field class="w-100">
                            <mat-label>Address Line 1 </mat-label>
                            <input matInput placeholder="Address Name 1" formControlName="address_line_1" >
                        </mat-form-field>

                    </div>

                    <div class="col-md-6">
                        <mat-form-field class="w-100">
                            <mat-label>Address Line 2</mat-label>
                            <input matInput placeholder="Address Name 2" formControlName="address_line_2">
                        </mat-form-field>
                    </div>

                    <div class="col-md-6">
                        <mat-form-field class="w-100">
                            <mat-label>City</mat-label>
                            <input matInput placeholder="City" formControlName="city">
                        </mat-form-field>
                    </div>

                    <div class="col-md-6">
                        <mat-form-field class="w-100">
                            <mat-label>State</mat-label>
                            <input matInput placeholder="State" formControlName="state">
                        </mat-form-field>
                    </div>

                    <div class="col-md-6">
                        <mat-form-field class="w-100">
                            <mat-label>Country</mat-label>
                            <input matInput placeholder="Country" formControlName="country">
                        </mat-form-field>
                    </div>


                   


                    <div class="col-md-6" hidden>
                        <mat-form-field class="w-100">
                            <mat-label>Landmark</mat-label>
                            <input matInput placeholder="Enter Landmark" formControlName="landmark">
                        </mat-form-field>
                    </div>



                    <div class="col-md-6">
                        <mat-form-field class="w-100">
                            <mat-label>Zip Code</mat-label>
                            <input matInput placeholder="Zip code" formControlName="postal_code">
                        </mat-form-field>
                    </div>

                    <div class="col-md-6" hidden>
                        <mat-form-field class="w-100">
                            <mat-label>Address Name</mat-label>
                            <input matInput placeholder="eg. home, office etc." formControlName="address_name">
                        </mat-form-field>
                    </div>

                    <div class="col-md-6">
                        <mat-form-field class="w-100">
                            <mat-label>Longitude</mat-label>
                            <input matInput placeholder="72.123" formControlName="longitude">
                        </mat-form-field>
                    </div>

                    <div class="col-md-6">
                        <mat-form-field class="w-100">
                            <mat-label>Latitude</mat-label>
                            <input matInput placeholder="35.123" formControlName="latitude">
                        </mat-form-field>
                    </div>


                    <div class="col-12">
                        <h1>Tax</h1>

                    </div>

                    <div class="col-md-6">
                        <mat-form-field class="w-100">
                            <mat-label>Tax (%)</mat-label>
                            <input type="number" matInput placeholder="Enter Tax" formControlName="tax_value">
                        </mat-form-field>
                    </div>

                    <div class="col-md-6 d-none">
                        <mat-form-field class="w-100">
                          <mat-label>Tax Type</mat-label>
                          <mat-select disabled [value]="'percentage'">
                            <mat-option [value]="'percentage'">Percentage</mat-option>
                          </mat-select>
                        </mat-form-field>
                      </div>
                    

                    <div class="col-12 mt-3">
                        <button class="btn btn-primary" (click)="createStore()">Create Store</button>
                    </div>
                </div>
            </div>
        </div>
    </form>



    <!-- /.card -->
</section>
<!-- /.content -->
