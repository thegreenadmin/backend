<!-- Content Header (Page header) -->
<section class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1>Stores List</h1>
            </div>
            <div class="col-sm-6 d-flex flex-wrap">
              <div class="btn-group ml-auto">
                  <button class="btn btn-primary" [routerLink]="'/stores/addstore/'">
                      Create Store
                  </button>
              </div>

              <div class="btn-group ml-3">
                <button class="btn btn-secondary" [routerLink]="'/stores/bulkstore/'">
                    Create Stores (bulk)
                </button>
            </div>
          </div>
            <div class="col-sm-6 d-flex flex-wrap">
            </div>
        </div>
    </div>
    <!-- /.container-fluid -->
</section>

<!-- Main content -->
<section class="content">
    <!-- Default box -->

    <div class="container-fluid mb-4">
        <div class="card py-3">
            <form [formGroup]="filterForm" class="card-head d-flex">
                
                <mat-form-field class="example-full-width" class="ml-3">
                    <mat-label>Search</mat-label>
                    <input matInput placeholder="Search" [(ngModel)]="query" formControlName="q">
                </mat-form-field>

            </form>
        </div>
    </div>
    <div class="container-fluid pb-5 position-relative">
        <div class="overlay-spinner" *ngIf="isLoadingResults">
            <mat-spinner></mat-spinner>
        </div>
        <div class="mat-elevation-z8">
            <table mat-table [dataSource]="data" 
            matSort [matSortActive]="sortBy" matSortDisableClear matSortDirection="desc"
            
            >

              <!-- Position Column -->
              <ng-container matColumnDef="store_id" >
                <th mat-header-cell *matHeaderCellDef mat-sort-header disableClear> Store Id </th>
                <td mat-cell *matCellDef="let element"> 
                    {{element.store_id}} 
                </td>
                
              </ng-container>
          

              <!-- Name Column -->
              <ng-container matColumnDef="store_name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
                <td mat-cell *matCellDef="let element"> {{element.store_name}} </td>
              </ng-container>
          
              <!-- Weight Column -->
              <ng-container matColumnDef="Email">
                <th mat-header-cell *matHeaderCellDef> Email </th>
                <td mat-cell *matCellDef="let element"> {{element.store_email}} </td>
              </ng-container>
          
              <!-- Symbol Column -->
              <ng-container matColumnDef="Phone">
                <th mat-header-cell *matHeaderCellDef> Phone </th>
                <td mat-cell *matCellDef="let element"> {{element.store_phone}} </td>
              </ng-container>

              <!-- Symbol Column -->
              <ng-container matColumnDef="Owner">
                <th mat-header-cell *matHeaderCellDef> Owner </th>
                <td mat-cell *matCellDef="let element"> {{element.store_owner}} </td>
              </ng-container>

              <!-- Symbol Column -->
              <ng-container matColumnDef="Status">
                <th mat-header-cell *matHeaderCellDef> Status </th>
                <td mat-cell *matCellDef="let element"> {{element.is_verified ? 'Verified' : 'Unverfied'}} </td>
              </ng-container>
          
              <ng-container matColumnDef="Action">
                <th mat-header-cell *matHeaderCellDef> Actions </th>
                <td mat-cell *matCellDef="let element">
                    <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Example icon-button with a menu">
                        <mat-icon>more_vert</mat-icon>
                      </button>
                      <mat-menu #menu="matMenu">
                        <button mat-menu-item class="pr-5"  [routerLink]="'/stores/storedetail/'+element.store_id" >
                            <mat-icon>remove_red_eye</mat-icon>
                            <span >View</span>
                        </button>
                    </mat-menu>
                </td>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
              
            </table>
          
            <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                           showFirstLastButtons
                           [length]="resultsLength"
                           aria-label="Select page of periodic elements">
            </mat-paginator>
          </div>
    </div>
    <!-- /.card -->
</section>
<!-- /.content -->
