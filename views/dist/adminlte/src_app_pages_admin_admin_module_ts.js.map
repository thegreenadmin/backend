<!-- Content Header (Page header) -->
<section class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-12 d-flex justify-content-between">

                <h1>Admin List</h1>
                <a routerLink="/admins/create" class="btn btn-primary"> Create new admin</a>
            </div>
           
        </div>
    </div>
    <!-- /.container-fluid -->
</section>

<!-- Main content -->
<section class="content">
    <!-- Default box -->

    

    <div class="container-fluid pb-5 position-relative">
        <div class="overlay-spinner" *ngIf="isLoadingResults">
            <mat-spinner></mat-spinner>
        </div>
        <div class="mat-elevation-z8">
            <table mat-table [dataSource]="data" 
            matSort [matSortActive]="sortBy" matSortDisableClear matSortDirection="desc"
            
            >

              <!-- Position Column -->
              <ng-container matColumnDef="id" >
                <th mat-header-cell *matHeaderCellDef disableClear> Id </th>
                <td mat-cell *matCellDef="let element"> 
                    {{element.id}} 
                </td>
                
              </ng-container>
          

              <!-- Name Column -->
              <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef> Name </th>
                <td mat-cell *matCellDef="let element"> {{element.name}} </td>
              </ng-container>
          
              <!-- Weight Column -->
              <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef> Email </th>
                <td mat-cell *matCellDef="let element"> {{element.email }} </td>
              </ng-container>
          
              <ng-container matColumnDef="Action">
                <th mat-header-cell *matHeaderCellDef > Actions </th>
                <td mat-cell *matCellDef="let element" >
                    <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Example icon-button with a menu">
                        <mat-icon>more_vert</mat-icon>
                      </button>
                      <mat-menu #menu="matMenu">
                        <button mat-menu-item class="pr-5" (click)="deleteAdmin(element?.id)" >
                            <mat-icon>delete</mat-icon>
                            <span >Delete</span>
                        </button>
                    </mat-menu>
                </td>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
              
            </table>
          
            <mat-paginator class="d-none" [pageSizeOptions]="[5, 10, 20]"
                           showFirstLastButtons
                           [length]="resultsLength"
                           aria-label="Select page of periodic elements">
            </mat-paginator>
          </div>
    </div>
    <!-- /.card -->
</section>
<!-- /.content -->
