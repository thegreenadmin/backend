<!-- Content Header (Page header) -->
<section class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1>Page</h1>
            </div>
        </div>
    </div>
    <!-- /.container-fluid -->
</section>

<!-- Main content -->
<section class="content">
    <!-- Default box -->
    <div class="container-fluid">
        <div class="card p-4">
            <form class="card-head w-100" [formGroup]="pageForm">

                <div class="row">


                    <div class="col-md-12">
                        <mat-form-field class="w-100" >
                            <mat-label>Name</mat-label>
                            <input matInput placeholder="Title" formControlName="name" >
                        </mat-form-field>
                    </div>

                    <div class="col-md-6">
                          <mat-form-field class="w-100">
                            <mat-label>Email</mat-label>
                            <input matInput placeholder="Slug" formControlName="email" >
                        </mat-form-field>

                    </div>

                    <div class="col-md-6">
                        <mat-form-field class="w-100">
                          <mat-label>Password</mat-label>
                          <input type="text" matInput placeholder="Slug" formControlName="password" >
                      </mat-form-field>

                  </div>

                    <div class="col-12 mt-3">
                        <button class="btn btn-primary" (click)="createAdmin()">Create admin</button>
                    </div>

                </div>

            </form>
        </div>
    </div>
    <!-- /.card -->
</section>
<!-- /.content -->
