<!-- Content Header (Page header) -->
<section class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1>Create Category</h1>
            </div>
            <div class="col-sm-6">
                <!-- <ol class="breadcrumb float-sm-right">
                    <li class="breadcrumb-item"><a href="#">Home</a></li>
                    <li class="breadcrumb-item active">Blank Page</li>
                </ol> -->
            </div>
        </div>
    </div>
    <!-- /.container-fluid -->
</section>

<!-- Main content -->
<section class="content">
    <!-- Default box -->
    <div class="overlay-spinner" *ngIf="isLoading">
        <!--  -->
        <mat-spinner></mat-spinner>
    </div>

    <form class="container-fluid" [formGroup]="categoryForm">
        <!-- [formGroup]="storeForm" -->
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4" [formGroup]="storeForm">
                        <mat-form-field class="example-full-width" appearance="fill" class="w-100">
                            <mat-label>Select store</mat-label>
                            <input type="text"
                                   placeholder="Select store"
                                   aria-label="Select store"
                                   matInput
                                   [matAutocomplete]="auto"
                                   formControlName="store_name"
                                   >
                            <mat-autocomplete autoActiveFirstOption #auto="matAutocomplete">
                              <mat-option *ngFor="let store of storeList" [value]="store.store_name" (click)="setStore(store)" [class.checked]="store.store_id == selectedStore?.store_id">
                                {{store.store_name}}
                              </mat-option>
                            </mat-autocomplete>
                        </mat-form-field>
                    </div>

                    <div class="col-md-4">
                        <mat-form-field class="w-100">
                          <mat-label>Category Name</mat-label>
                          <input matInput placeholder="Enter cetegory" formControlName="category_name">
                        </mat-form-field>
                    </div>
            
                    <div class="col-md-4">
                        <mat-form-field class="w-100">
                          <mat-label>Featured Category</mat-label>
                          <mat-select formControlName="is_featured_category">
                            <mat-option [value]="true">True</mat-option>
                            <mat-option [value]="false">False</mat-option>
                          </mat-select>
                        </mat-form-field>
                    </div>

                    <div class="col-12">
                        <div class="row">
                          <div class="col-md-4">
                            <img [src]="imageDynamicUrl" width="100%" height="auto" alt="">
                          </div>
                          <div class="col-md-4">
                            <mat-label>Upload Image*</mat-label> <br>
                            <input type="hidden" formControlName="image_url">
                            <input type="file" class="file-upload" (change)="fileUpload($event.target.files)">
                          </div>
                        </div>
                    </div>

                    <div class="col-12 mt-3">
                        <button class="btn btn-primary" (click)="createCategory()">Create Category</button>
                      </div>
                </div>

                


            </div>
        </div>
    </form>



    <!-- /.card -->
</section>
<!-- /.content -->
