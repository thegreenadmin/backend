<section class="content-header">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-sm-6">
        <h1>Category Details</h1>
      </div>
      <div class="col-sm-6 d-flex">
        <button class="btn btn-danger ml-auto" (click)="deleteCategory()">Delete Category</button>
    </div>
      <div class="col-sm-6">
      </div>
    </div>
  </div>
  <!-- /.container-fluid -->
</section>

<!-- Main content -->
<section class="content">
  <!-- Default box -->
  <div class="overlay-spinner" *ngIf="isLoading" >
    <!-- *ngIf="isLoading" -->
    <mat-spinner></mat-spinner>
  </div>

  <form class="container-fluid" [formGroup]="categoryForm">
    <div class="card">
      <div class="card-body">
        <div class="row">


          <div class="col-12">
            <div class="row">
              <div class="col-md-4">
                <mat-form-field class="w-100">
                  <mat-label>Store name</mat-label>
                  <input matInput placeholder="Enter Store" disabled="" [value]="storeName">
                </mat-form-field>
              </div>

              <div class="col-md-4">
                <mat-form-field class="w-100">
                  <mat-label>Category Name</mat-label>
                  <input matInput placeholder="Enter category" formControlName="category_name">
                </mat-form-field>
              </div>
    
              <div class="col-md-4">
                <mat-form-field class="w-100">
                  <mat-label>Featured Category</mat-label>
                  <mat-select formControlName="is_featured_category">
                    <mat-option [value]="true">True</mat-option>
                    <mat-option [value]="false">False</mat-option>
                  </mat-select>
                </mat-form-field>
              </div>
            </div>
          </div>

          <div class="col-12">
            <div class="row">
              <div class="col-md-4">
                <img [src]="imageDynamicUrl" width="100%" height="auto" alt="">
              </div>
              <div class="col-md-4">
                <mat-label>Upload Image</mat-label> <br>
                <input type="hidden" formControlName="image_url">
                <input type="file" class="file-upload" (change)="fileUpload($event.target.files)">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12 mt-3">
      <button class="btn btn-primary" (click)="updateCategory()">Update Category</button>
    </div>

  </form>

  <!-- /.card -->
</section>
<!-- /.content -->
