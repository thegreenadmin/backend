<!-- Content Header (Page header) -->
<section class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">

                <h1>Notifications</h1>
            </div>
           
        </div>
    </div>
    <!-- /.container-fluid -->
</section>

<!-- Main content -->
<section class="content">
    <!-- Default box -->

    

    <div class="container-fluid pb-5 position-relative">
        <div class="overlay-spinner" *ngIf="isLoadingResults">
            <mat-spinner></mat-spinner>
        </div>
        <div class="mat-elevation-z8">
            <table mat-table [dataSource]="data" 
            matSort [matSortActive]="sortBy" matSortDisableClear matSortDirection="desc"
            
            >

              <!-- Position Column -->
              <ng-container matColumnDef="admin_notification_id" >
                <th mat-header-cell *matHeaderCellDef mat-sort-header disableClear> Notification Id </th>
                <td mat-cell *matCellDef="let element"> 
                    {{element.admin_notification_id}} 
                </td>
                
              </ng-container>
          

              <!-- Name Column -->
              <ng-container matColumnDef="message">
                <th mat-header-cell *matHeaderCellDef> Message </th>
                <td mat-cell *matCellDef="let element"> {{element.message}} </td>
              </ng-container>
          
              <!-- Weight Column -->
              <ng-container matColumnDef="date">
                <th mat-header-cell *matHeaderCellDef> Date </th>
                <td mat-cell *matCellDef="let element"> {{element.createdAt | date: 'MM/dd/yyyy'}} </td>
              </ng-container>
          
              <!-- Symbol Column -->
              <ng-container matColumnDef="time">
                <th mat-header-cell *matHeaderCellDef> Time </th>
                <td mat-cell *matCellDef="let element"> {{element.createdAt | date: 'HH:mm:ss'}} </td>
              </ng-container>
          
              <ng-container matColumnDef="Action">
                <th mat-header-cell *matHeaderCellDef > Actions </th>
                <td mat-cell *matCellDef="let element" >
                    <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Example icon-button with a menu">
                        <mat-icon>more_vert</mat-icon>
                      </button>
                      <mat-menu #menu="matMenu">
                        <button mat-menu-item class="pr-5"  [routerLink]="
                        element.order_id ? '/orders/ordersdetail/'+element.order_id+'/'+element.order.store_id : 
                        element.store_id ? '/stores/storedetail/'+element.store_id: 
                        element.claim_store_id ? '/claim/details/'+element.claim_store_id : 
                        '/settings/contactQuery/'+element.contact_query_id  
                        " >
                            <mat-icon>remove_red_eye</mat-icon>
                            <span >View</span>
                        </button>
                    </mat-menu>
                </td>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
              
            </table>
          
            <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                           showFirstLastButtons
                           [length]="resultsLength"
                           aria-label="Select page of periodic elements">
            </mat-paginator>
          </div>
    </div>
    <!-- /.card -->
</section>
<!-- /.content -->
