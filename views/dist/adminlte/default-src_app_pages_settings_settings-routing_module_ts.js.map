<section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Customer Service Fee</h1>
        </div>
        
        <div class="col-sm-6">
        </div>
      </div>
    </div>
    <!-- /.container-fluid -->
  </section>
  
  <!-- Main content -->
  <section class="content">
    <!-- Default box -->
    <div class="overlay-spinner" *ngIf="isLoading" >
      <!-- *ngIf="isLoading" -->
      <mat-spinner></mat-spinner>
    </div>
  
    <form class="container-fluid" *ngIf="!isLoading" [formGroup]="orderServiceChargeForm">
      <div class="card">
        <div class="card-body">
          <div class="row">
  
  
            <div class="col-12">
              <div class="row">


                <div class="col-md-4">
                    <mat-form-field class="w-100">
                      <mat-label>Charge Type</mat-label>
                      <mat-select formControlName="service_charge_type">
                        <mat-option [value]="'percentage'">Percentage</mat-option>
                        <mat-option [value]="'amount'">Amount</mat-option>
                      </mat-select>
                    </mat-form-field>
                  </div>
  
                <div class="col-md-4">
                  <mat-form-field class="w-100">
                    <mat-label> Value</mat-label>
                    <input matInput type="number" placeholder="Enter category" formControlName="service_charge_value">
                  </mat-form-field>
                </div>
      
                
              </div>
            </div>

          </div>
        </div>
      </div>
  
      <div class="col-12 mt-3">
        <button class="btn btn-primary" (click)="updateStoreServiceCharge()">Update Charge</button>
      </div>
  
    </form>
  
    <!-- /.card -->
  </section>
  <!-- /.content -->
