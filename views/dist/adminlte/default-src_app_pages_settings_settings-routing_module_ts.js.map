<section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1 *ngIf="roleName != ''">
            <b>{{roleName}}</b> 
            Role
          </h1>
        </div>
        
        <div class="col-sm-6">
        </div>
      </div>
    </div>
    <!-- /.container-fluid -->
  </section>
  
  <!-- Main content -->
  <section class="content">
    <!-- Default box -->
    <div class="overlay-spinner" *ngIf="isLoading" >
      <!-- *ngIf="isLoading" -->
      <mat-spinner></mat-spinner>
    </div>
  
    <form class="container-fluid" *ngIf="roleName != ''" [formGroup]="defaultRoleForm">
      <div class="card" *ngIf="controllers.length">
        <div class="card-body">
          <div class="row" formArrayName="default_permissions">
            
            <div 
                class="col-md-6"
                *ngFor="let permissionGroup of defaultRoleForm.controls.default_permissions['controls']; let i = index" [formGroupName]="i">
                <!-- Access individual form controls within the FormGroup -->
                <mat-checkbox class="example-margin" formControlName="value">
                    <p class="pt-2 mb-0">{{ permissionGroup.controls.controller_name.value }}</p>
                </mat-checkbox>
            </div>

          </div>
        </div>
      </div>
  
      <div class="col-12 mt-3">
        <button class="btn btn-primary" (click)="updateRole()">Update Role</button>
      </div>
  
    </form>
  
    <!-- /.card -->
  </section>
  <!-- /.content -->
