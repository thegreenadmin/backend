<section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Tax settings</h1>
        </div>
        
        <div class="col-sm-6">
        </div>
      </div>
    </div>
    <!-- /.container-fluid -->
  </section>
  
  <!-- Main content -->
  <section class="content">
    <!-- Default box -->
    <div class="overlay-spinner" *ngIf="isLoading" >
      <!-- *ngIf="isLoading" -->
      <mat-spinner></mat-spinner>
    </div>
  
    <form class="container-fluid" *ngIf="!isLoading" [formGroup]="taxForm">
      <div class="card">
        <div class="card-body">
          <div class="row">
  
  
            <div class="col-12">
              <div class="row">


                <div class="col-md-4 d-none">
                    <mat-form-field class="w-100">
                      <mat-label>Default Store Tax (%)</mat-label>
                      <mat-select disabled formControlName="tax_type">
                        <mat-option [value]="'percentage'">Percentage</mat-option>
                      </mat-select>
                    </mat-form-field>
                  </div>
  
                <div class="col-md-6">
                  <mat-form-field class="w-100">
                    <mat-label>Default Store Tax (%)</mat-label>
                    <input matInput type="number" placeholder="Tax" formControlName="tax_value">
                  </mat-form-field>
                </div>


                <div class="col-md-6">
                    <mat-form-field class="w-100">
                      <mat-label>Calculate Tax using Stripe</mat-label>
                      <mat-select formControlName="stripe_enabled_tax" >
                        <mat-option [value]="true">Enabled</mat-option>
                        <mat-option [value]="false">Disabled</mat-option>
                      </mat-select>
                    </mat-form-field>
                  </div>

                <div class="col-12">
                    <div class="card w-100">
                        <div class="card-heading px-4 py-3">
                            <h3 class="mb-0">Note: Changing default store tax setting won't impact the tax rate of existing stores</h3>
                        </div>
                    </div>
                </div>
      
                
              </div>
            </div>

          </div>
        </div>
      </div>
  
      <div class="col-12 mt-3">
        <button class="btn btn-primary" (click)="updateTax()">Update Tax</button>
      </div>
  
    </form>
  
    <!-- /.card -->
  </section>
  <!-- /.content -->
