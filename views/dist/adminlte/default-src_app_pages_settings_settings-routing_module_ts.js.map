<section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1 *ngIf="membershipPlan">{{membershipPlan.plan_type.substring(0,1).toUpperCase()}}{{membershipPlan.plan_type.substring(1,membershipPlan.plan_type.length)}} Charge</h1>
        </div>
        
        <div class="col-sm-6">
        </div>
      </div>
    </div>
    <!-- /.container-fluid -->
  </section>
  
  <!-- Main content -->
  <section class="content">
    <!-- Default box -->
    <div class="overlay-spinner" *ngIf="isLoading" >
      <!-- *ngIf="isLoading" -->
      <mat-spinner></mat-spinner>
    </div>
  
    <form class="container-fluid" *ngIf="!isLoading" [formGroup]="membershipPlanForm">
      <div class="card" *ngIf="membershipPlan">
        <div class="card-body">
          <div class="row">
  
  
            <div class="col-12">
              <div class="row">


                <div class="col-md-6">
                    <mat-form-field class="w-100">
                      <mat-label>Type</mat-label>
                      <mat-select [value]="membershipPlan.plan_type" disabled>
                        <mat-option [value]="'product'">Product</mat-option>
                        <mat-option [value]="'store'">Store</mat-option>
                        <mat-option [value]="'combo'">Combo</mat-option>

                      </mat-select>
                    </mat-form-field>
                </div>

                <div class="col-md-6">
                  <mat-form-field class="w-100">
                    <mat-label>Plan Name</mat-label>
                    <input matInput type="text" placeholder="Plan Name" formControlName="plan_name">
                  </mat-form-field>
                </div>
  

                <div class="col-md-6">
                  <mat-form-field class="w-100">
                    <mat-label>Monthly Charge</mat-label>
                    <input matInput type="number" placeholder="Monthly Charge" formControlName="plan_30_charge" >
                  </mat-form-field>
                </div>

                <div class="col-md-6">
                  <mat-form-field class="w-100">
                    <mat-label>Quaterly Charge</mat-label>
                    <input matInput type="number" placeholder="Quarterly Charge" formControlName="plan_90_charge" >
                  </mat-form-field>
                </div>

                <div class="col-md-6">
                  <mat-form-field class="w-100">
                    <mat-label>Half yearly Charge</mat-label>
                    <input matInput type="number" placeholder="Half Yearly Charge" formControlName="plan_180_charge" >
                  </mat-form-field>
                </div>

                <div class="col-md-6">
                  <mat-form-field class="w-100">
                    <mat-label>Yearly Charge</mat-label>
                    <input matInput type="number" placeholder="Yearly Charge" formControlName="plan_365_charge" >
                  </mat-form-field>
                </div>

                <div class="col-12">
                  <mat-form-field class="w-100">
                      <mat-label>Plan Description</mat-label>
                      <textarea matInput placeholder="Description" formControlName="plan_description"></textarea>
                  </mat-form-field>
                </div>


                <div class="col-12 mt-3">
                  <button class="btn btn-primary" (click)="updateCharge()">Update</button>
                </div>
                
              </div>
            </div>

          </div>
        </div>
      </div>
  
      
  
    </form>
  
    <!-- /.card -->
  </section>
  <!-- /.content -->
