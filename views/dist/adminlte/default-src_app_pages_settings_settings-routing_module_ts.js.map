<!-- Content Header (Page header) -->
<section class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1>Create Store Service</h1>
            </div>
            <div class="col-sm-6">
                <!-- <ol class="breadcrumb float-sm-right">
                    <li class="breadcrumb-item"><a href="#">Home</a></li>
                    <li class="breadcrumb-item active">Blank Page</li>
                </ol> -->
            </div>
        </div>
    </div>
    <!-- /.container-fluid -->
</section>

<!-- Main content -->
<section class="content">
    <!-- Default box -->
    <div class="overlay-spinner" *ngIf="isLoading">
        <mat-spinner></mat-spinner>
    </div>

    <form class="container-fluid" [formGroup]="storeServiceChargeForm">
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <div [formGroup]="storeForm">
                            <mat-form-field class="example-full-width" appearance="fill" class="w-100">
                                <mat-label>Select store</mat-label>
                                <input type="text"
                                       placeholder="Select store"
                                       aria-label="Select store"
                                       matInput
                                       [matAutocomplete]="auto"
                                       formControlName="store_name"
                                       >
                                <mat-autocomplete autoActiveFirstOption #auto="matAutocomplete" >
                                  <mat-option *ngFor="let store of stores" [value]="store.store_name"  (click)="changeStore(store)" [class.checked]="store.store_id == storeId">
                                    {{store.store_name}}
                                  </mat-option>
                                </mat-autocomplete>
                            </mat-form-field>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <mat-form-field class="w-100">
                            <mat-label>Charge Type</mat-label>
                            <mat-select formControlName="service_charge_type">
                                <mat-option [value]="'percentage'">Percentage</mat-option>
                                <mat-option [value]="'amount'">Amount</mat-option>
                              </mat-select>
                        </mat-form-field>
                    </div>

                    <div class="col-md-4">
                        <mat-form-field class="w-100">
                            <mat-label>Service Charge Value</mat-label>
                            <input matInput placeholder="Enter Service Charge Value" formControlName="service_charge_value">
                        </mat-form-field>
                    </div>


                    <div class="col-12 mt-3">
                        <button class="btn btn-primary" (click)="createStoreservice()">Create Store</button>
                    </div>
                </div>
            </div>
        </div>
    </form>



    <!-- /.card -->
</section>
<!-- /.content -->
