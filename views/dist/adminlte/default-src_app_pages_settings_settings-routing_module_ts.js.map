<!-- Content Header (Page header) -->
<section class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">

                <h1>Membership plans</h1>
            </div>
           
        </div>
    </div>
    <!-- /.container-fluid -->
</section>

<!-- Main content -->
<section class="content">
    <!-- Default box -->

    

    <div class="container-fluid pb-5 position-relative">
        <div class="overlay-spinner" *ngIf="isLoadingResults">
            <mat-spinner></mat-spinner>
        </div>
        <div class="mat-elevation-z8">
            <table mat-table [dataSource]="data" 
            matSort [matSortActive]="sortBy" matSortDisableClear matSortDirection="desc"
            
            >

              <!-- Position Column -->
              <ng-container matColumnDef="plan_name" >
                <th mat-header-cell *matHeaderCellDef disableClear> Plan Name </th>
                <td mat-cell *matCellDef="let element"> 
                    {{element.plan_name}} 
                </td>
                
              </ng-container>
          

              <!-- Name Column -->
              <ng-container matColumnDef="plan_type">
                <th mat-header-cell *matHeaderCellDef> Type </th>
                <td mat-cell *matCellDef="let element"> {{element.plan_type}} </td>
              </ng-container>
          
              <!-- Weight Column -->
              <ng-container matColumnDef="plan_90_charge">
                <th mat-header-cell *matHeaderCellDef> Quarterly Charge </th>
                <td mat-cell *matCellDef="let element"> ${{element.plan_90_charge.toFixed(2) }} </td>
              </ng-container>
          
              <!-- Symbol Column -->
              <ng-container matColumnDef="plan_30_charge">
                <th mat-header-cell *matHeaderCellDef> Monthly Charge </th>
                <td mat-cell *matCellDef="let element"> ${{element.plan_30_charge.toFixed(2) }} </td>
              </ng-container>
          
              <ng-container matColumnDef="Action">
                <th mat-header-cell *matHeaderCellDef > Actions </th>
                <td mat-cell *matCellDef="let element" >
                    <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Example icon-button with a menu">
                        <mat-icon>more_vert</mat-icon>
                      </button>
                      <mat-menu #menu="matMenu">
                        <button mat-menu-item class="pr-5"  [routerLink]="'/settings/memberships/details/'+element.membership_plan_id" >
                            <mat-icon>remove_red_eye</mat-icon>
                            <span >View</span>
                        </button>
                    </mat-menu>
                </td>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
              
            </table>
          
            <mat-paginator class="d-none" [pageSizeOptions]="[5, 10, 20]"
                           showFirstLastButtons
                           [length]="resultsLength"
                           aria-label="Select page of periodic elements">
            </mat-paginator>
          </div>
    </div>
    <!-- /.card -->
</section>
<!-- /.content -->
