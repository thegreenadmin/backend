<section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Contact query</h1>
        </div>
        <div class="col-sm-6 d-flex">
      </div>
        <div class="col-sm-6">
        </div>
      </div>
    </div>
    <!-- /.container-fluid -->
  </section>
  
  <!-- Main content -->
  <section class="content">
    <!-- Default box -->
    <div class="overlay-spinner" *ngIf="isLoading" >
      <!-- *ngIf="isLoading" -->
      <mat-spinner></mat-spinner>
    </div>
  
    <form class="container-fluid" [formGroup]="contactForm">
      <div class="card">
        <div class="card-body" *ngIf="contactQuery">
          <div class="row">
  
  
            <div class="col-12">
              <div class="row" >
                <div class="col-md-6">
                  <mat-form-field class="w-100">
                    <mat-label>Name</mat-label>
                    <input matInput placeholder="User name" disabled [value]="contactQuery.name">
                  </mat-form-field>
                </div>

                <div class="col-md-6">
                  <mat-form-field class="w-100">
                    <mat-label>Email</mat-label>
                    <input type="email" matInput placeholder="Email" disabled [value]="contactQuery.email">
                  </mat-form-field>
                </div>

                <div class="col-md-12">
                  <mat-form-field class="w-100">
                    <mat-label>Subject</mat-label>
                    <input matInput placeholder="Subject" disabled [value]="contactQuery.subject">
                  </mat-form-field>
                </div>

                <div class="col-md-12">
                  <mat-form-field class="w-100">
                    <mat-label>Message</mat-label>
                    <textarea matInput disabled>{{contactQuery.message}}</textarea>
                  </mat-form-field>
                </div>

                <div class="col-md-12">
                  <mat-form-field class="w-100">
                    <mat-label>Reply</mat-label>
                    <textarea matInput [disabled]="contactQuery.is_reply_sent" #reply>{{contactQuery.reply}}</textarea>
                  </mat-form-field>
                </div>
  
                
              </div>
            </div>

            <div class="col-12 mt-3">
              <button class="btn btn-primary" [disabled]="contactQuery.is_reply_sent" (click)="sendReply(reply.value)">Send Reply</button>
            </div>

          </div>
        </div>
      </div>
  
      
  
    </form>
  
    <!-- /.card -->
  </section>
  <!-- /.content -->
