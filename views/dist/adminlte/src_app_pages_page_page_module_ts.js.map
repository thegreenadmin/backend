<!-- Content Header (Page header) -->
<section class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">

                <h1>Pages</h1>
            </div>
            <div class="col-sm-6 d-flex flex-wrap">
                <button class="btn btn-primary ml-auto" [routerLink]="'/pages/pagecreate/'">Create Page</button>
            </div>
        </div>
    </div>
    <!-- /.container-fluid -->
</section>

<!-- Main content -->
<section class="content">
    <!-- Default box -->

    <div class="container-fluid mb-4">
        <div class="card py-3">
            <form [formGroup]="filterForm" class="card-head d-flex">
                
                <mat-form-field class="example-full-width" class="ml-3">
                    <mat-label>Search</mat-label>
                    <input matInput placeholder="Search" [(ngModel)]="query" formControlName="q">
                </mat-form-field>

            </form>
        </div>
    </div>

    <div class="container-fluid pb-5 position-relative">
        <div class="overlay-spinner" *ngIf="isLoadingResults">
            <mat-spinner></mat-spinner>
        </div>
        <div class="mat-elevation-z8">
            <table mat-table [dataSource]="data" 
            matSort [matSortActive]="sortBy" matSortDisableClear matSortDirection="desc"
            
            >

              <!-- Position Column -->
              <ng-container matColumnDef="page_id" >
                <th mat-header-cell *matHeaderCellDef mat-sort-header disableClear> Page Id </th>
                <td mat-cell *matCellDef="let element"> 
                    {{element.page_id}} 
                </td>
                
              </ng-container>
          

              <!-- Name Column -->
              <ng-container matColumnDef="page_title">
                <th mat-header-cell *matHeaderCellDef> Title </th>
                <td mat-cell *matCellDef="let element"> {{element.page_title}} </td>
              </ng-container>
          
              <!-- Weight Column -->
              <ng-container matColumnDef="is_system_page">
                <th mat-header-cell *matHeaderCellDef> System Page </th>
                <td mat-cell *matCellDef="let element"> {{element.is_system_page}} </td>
              </ng-container>
          
              <!-- Symbol Column -->
              <ng-container matColumnDef="slug">
                <th mat-header-cell *matHeaderCellDef> Slug </th>
                <td mat-cell *matCellDef="let element"> {{element.slug}} </td>
              </ng-container>
          
              <ng-container matColumnDef="Action">
                <th mat-header-cell *matHeaderCellDef> Actions </th>
                <td mat-cell *matCellDef="let element">
                    <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Example icon-button with a menu">
                        <mat-icon>more_vert</mat-icon>
                      </button>
                      <mat-menu #menu="matMenu">
                        <button mat-menu-item class="pr-5"  [routerLink]="'/pages/details/'+element.page_id" >
                            <mat-icon>remove_red_eye</mat-icon>
                            <span >View</span>
                        </button>
                    </mat-menu>
                </td>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
              
            </table>
          
            <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                           showFirstLastButtons
                           [length]="resultsLength"
                           aria-label="Select page of periodic elements">
            </mat-paginator>
          </div>
    </div>
    <!-- /.card -->
</section>
<!-- /.content -->
