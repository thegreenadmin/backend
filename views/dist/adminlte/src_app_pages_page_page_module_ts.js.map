<!-- Content Header (Page header) -->
<section class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1>Page Details</h1>
            </div>
            <div class="col-sm-6 d-flex">
                <button class="btn btn-danger ml-auto" (click)="deletePage()">Delete page</button>
            </div>
        </div>
    </div>
    <!-- /.container-fluid -->
</section>

<!-- Main content -->
<section class="content">
    <!-- Default box -->
    <div class="container-fluid">
        <div class="card p-4">
            <form class="card-head w-100" [formGroup]="pageForm">

                <div class="row" *ngIf="page">


                    <div class="col-md-12">
                        <mat-form-field class="w-100" >
                            <mat-label>Title</mat-label>
                            <input matInput placeholder="Title" formControlName="page_title" >
                        </mat-form-field>
                    </div>

                    <div class="col-md-6">
                        <mat-form-field class="w-100" >
                            <mat-label>Slug</mat-label>
                            <input matInput placeholder="Slug" formControlName="slug" >
                        </mat-form-field>
                    </div>

                    <div class="col-md-6">
                        <mat-form-field appearance="fill" class="w-100">
                            <mat-label>System page</mat-label>
                            <mat-select formControlName="is_system_page">
                                <mat-option [value]="true" >True</mat-option>
                                <mat-option [value]="false" >False</mat-option>
                            </mat-select>
                          </mat-form-field>
                    </div>

                    <div class="col-12">
                        <angular-editor placeholder="Enter page content here..." [config]="editorConfig" formControlName="page_content" ></angular-editor>
                    </div>

                    <div class="col-12 mt-3">
                        <button class="btn btn-primary" (click)="updatePage()">Update page</button>
                    </div>

                </div>

            </form>
        </div>
    </div>
    <!-- /.card -->
</section>
<!-- /.content -->
