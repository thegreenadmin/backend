<!-- Content Header (Page header) -->
<section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Order details</h1>
        </div>
        <div class="btn-group ml-auto" >
            <!-- *ngIf="user" -->
         
          
      </div>
      </div>
    </div>
    <!-- /.container-fluid -->
  </section>
  <div class="card">
    <div class="card-body" *ngIf="order">
      <div class="row" >
        
        <div class="col-md-6 mb-3">
          <label for="order-id">Order Id</label>
          <input type="text" class="form-control" id="order-id" placeholder="Enter total amount" [value]="order.order_id" readonly>
        </div>
        <div class="col-md-6 mb-3">
          <label for="customer-name">Customer Name</label>
          <input type="text" class="form-control" id="customer-name" placeholder="Enter customer name" [value]="order.customer_name" readonly>
        </div>
      </div>
  
      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="customer-email">Customer Email</label>
          <input type="text" class="form-control" id="customer-email" placeholder="Enter customer email" [value]="order.customer_email" readonly>
        </div>
        <div class="col-md-6 mb-3">
          <label for="phone-code">Phone Code</label>
          <input type="text" class="form-control" id="phone-code" placeholder="Enter phone code" [value]="order.customer_phone_code" readonly>
        </div>
      </div>
  
      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="customer-phone">Phone</label>
          <input type="text" class="form-control" id="customer-phone" placeholder="Enter customer phone" [value]="order.customer_phone" readonly>
        </div>
        <div class="col-md-6 mb-3">
          <label for="order-status">Order Status</label>
          <input type="text" class="form-control" id="order-status" placeholder="Enter order status" [value]="order.order_histories[order.order_histories.length - 1].order_status.order_status_name" readonly>
        </div>
      </div>
  
      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="amount">Customer Service Charge</label>
          <input type="text" class="form-control" id="amount" placeholder="Enter amount" [value]="'$'+order.total_service_charged.toFixed(2)" readonly>
        </div>
        <div class="col-md-6 mb-3">
          <label for="tax-charges">Tax</label>
          <input type="text" class="form-control" id="tax-charges" placeholder="Enter tax charges" [value]="'$'+order.total_tax_charged.toFixed(2)" readonly>
        </div>
      </div>
  
      <div class="row">

        <div class="col-md-6 mb-3" *ngIf="order.order_transactions && order.order_transactions.length">
          <label for="tax-charges">Store Service Charge</label>
          <input type="text" class="form-control" id="tax-charges" placeholder="Enter tax charges" [value]="'$'+order.order_transactions[0].store_total_service_charged.toFixed(2)" readonly>
        </div>

        <div class="col-md-6 mb-3">
          <label for="delivery-charge">Delivery charge</label>
          <input type="text" class="form-control" id="delivery-charge" placeholder="Enter delivery charge" [value]="'$'+order.delivery_charge" readonly>
        </div>

        <div class="col-md-6 mb-3">
          <label for="total-amount">Total Order Value</label>
          <input type="text" class="form-control" id="total-amount" placeholder="Enter total amount" [value]="'$'+order.total_amount.toFixed(2)" readonly>
        </div>
        
        <div class="col-md-6 mb-3">
          <label for="collected-amount">Store Earnings</label>
          <input type="text" class="form-control" id="collected-amount" placeholder="Enter total amount" [value]="'$'+(storeEarning).toFixed(2)" readonly>
        </div>

        <div class="col-md-6 mb-3">
          <label for="refund-amount">Partial Order Refund Amount</label>
          <input type="text" class="form-control" id="refund-amount" placeholder="Enter total amount" [value]="'$'+(refundAmount.toFixed(2)) " readonly>
        </div>

        <div class="col-md-6 mb-3">
          <label for="green-amount">The Green Mall Earning</label>
          <input type="text" class="form-control" id="green-amount" placeholder="Enter total amount" [value]="'$'+(greenEarning.toFixed(2)) " readonly>
        </div>
        
      </div>
    </div>
  </div>
 
  <div class="card" style="background-color: #f9f9f9; padding: 20px;" *ngIf="order">
    <div class="card-body">
      <h2>Product</h2>
      <table class="table">
        <tbody>
          <tr>
            <th>Items Count</th>
            <th>Name</th>
            <th>Status</th>
            <th>Price</th>
            <th>Discount</th>
            <th>Image</th>
          </tr>
          <tr *ngFor="let orderItem of order.order_items; index as i">
            
            <td>{{ orderItem.order_item_count }}</td>
            <td>{{ orderItem.product.product_name }}</td>
            <td>{{ orderItem.order_item_status }}</td>
            <td>${{ getProductPrice(orderItem).toFixed(2) }}</td>
            <td>${{ getProductDiscount(orderItem).toFixed(2) }}</td>
            
            <td>
              <img style="width: 30px;" [src]="orderItem.product?.product_images[0]?.image.dynamic_url" alt="Product Image">
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
