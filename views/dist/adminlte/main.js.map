<div class="card card-outline card-primary">
    <div class="card-header text-center">
        <a [routerLink]="['/']" class="h1">
            <img src="./../../../assets/img/logo.png" width="200" alt="">
        </a>
    </div>
    <div class="card-body">
        <p class="login-box-msg">
            Enter Your Existing & New Password !
        </p>
        <form [formGroup]="changePasswordForm" (ngSubmit)="ResetPassword()">
         
           

            <div class="input-group mb-3">
                <input formControlName="previous_password" type="password" class="form-control" placeholder="Previous Password" #pass />
                <div class="input-group-append">
                    <div class="input-group-text">
                        <span class="fas fa-key"></span>
                    </div>
                </div>
            </div>

            <div class="input-group mb-3">
                <input formControlName="new_password" type="password" class="form-control" placeholder="New Password" #conf />
                <div class="input-group-append">
                    <div class="input-group-text">
                        <span class="fas fa-key"></span>
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-12">
                    <button class="btn btn-primary w-100" [disabled]="(pass.value == conf.value) || (pass.value.length < 7)" (click)="ChangePassword()">
                        Change password
                    </button>
                </div>
            </div>
        </form>
        <p class="mt-3 mb-1">
            <a [routerLink]="['/Dashboard']">Dashboard</a>
        </p>
    </div>
</div>
