

<!-- Main content -->
<section class="content" *ngIf="admin">
    <div class="container-fluid">
        <div class="row">
            <div class="col-xl-4 col-lg-6">
                <!-- Profile Image -->
                <form class="card card-primary card-outline" [formGroup]="form">
                    <div class="card-body box-profile">

                        <div class="text-center">
                            <pf-image
                                class="user-img"
                                [src]="imageDynamicUrl"
                                alt="User profile picture"
                                width="100"
                                height="100"
                                rounded
                            ></pf-image>
                        </div>
                        <div class="d-flex w-100 justify-content-center mb-3">
                            <input type="hidden" formControlName="image_url" formControlName="image_url">
                            <input type="file" class="file-upload" (change)="fileUpload($event.target.files)">
                        </div>

                        <div class="mb-2">
                           <input type="text" name="name" class="w-100 px-2 py-1" [value]="admin?.name" placeholder="Name" formControlName="name">
                        </div>

                        <div class="mb-4">
                            <input type="email" name="email" class="w-100 px-2 py-1" [value]="admin?.email" placeholder="Email" formControlName="email">
                        </div>

                        <button class="btn btn-sm btn-primary" (click)="updateProfile()">
                            Update profile
                        </button>

                    </div>
                    <!-- /.card-body -->
                </form>
                <!-- /.card -->

                <!-- About Me Box -->
              
                <!-- /.card -->
            </div>
            <!-- /.col -->
            <div class="col-md-9">
                <div class="card">
                   
                    <!-- /.card-header -->
                   
                    <!-- /.card-body -->
                </div>
                <!-- /.nav-tabs-custom -->
            </div>
            <!-- /.col -->
        </div>
        <!-- /.row -->
    </div>
    <!-- /.container-fluid -->
</section>
