<pf-dropdown hide-arrow>
    <div slot="button" (click)="showNotifications()" #notificationButton>
        <a class="nav-link">
            <i class="far fa-bell"></i>
            <span class="badge badge-warning navbar-badge">{{unreadCount}}</span>
        </a>
    </div>
    <div slot="menu">
        <div class="dropdown-divider"></div>
        <a class="dropdown-item" *ngFor="let n of notifications" 
        (click)="notificationButton.click()"
        [routerLink]="
            [n.order_id ? '/orders/ordersdetail/'+n.order_id+'/'+n.order.store_id : 
            n.store_id ? '/stores/storedetail/'+n.store_id: 
            n.claim_store_id ? '/claim/details/'+n.claim_store_id: 
            '/settings/contactQuery/'+n.contact_query_id ]        
            ">
                <i class="fas fa-envelope mr-2"></i> {{n.message}}
                <!-- <span class="float-right text-muted text-sm">3 mins</span> -->
        </a>
       
        <div class="dropdown-divider"></div>
        <a class="dropdown-item dropdown-footer" [routerLink]="'/settings/notifications'" (click)="notificationButton.click()"
            >See All Notifications</a
        >
    </div>
</pf-dropdown>
