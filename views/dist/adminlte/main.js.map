<div class="payments">
    <h2>{{title}}</h2>
    <table>
      <thead>
        <tr>
          <th *ngFor="let heading of header">{{heading}}</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of rows">
          <td>{{row['Google Pay']}}</td>
          <td>{{row['Apple Pay']}}</td>
          <td>{{row['PayPal']}}</td>
          <td>{{row['Date']}}</td>
        </tr>
      </tbody>
    </table>
  </div>
