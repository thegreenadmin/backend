<!-- Brand Logo -->
<a [routerLink]="['/']" class="brand-link text-center bg-light">
    <img src="./../../../../assets/img/logo.png" width="200" height="31" alt="" class="mx-auto">
    <img src="./../../../../assets/img/logo-sm.png" width="29" height="31" alt="" class="mx-auto">

</a>

<!-- Sidebar -->
<div class="sidebar">
    <!-- Sidebar user (optional) -->
    <div class="user-panel mt-3 pb-3 mb-3 d-flex">
        <div class="image">
            <img [src]="
                (user?.image?.dynamic_url) ?
                (user?.image?.dynamic_url) :
                'assets/img/default-profile.png'
                " class="user-image-small" width="90" height="90" alt="User Image">
        </div>
        <div class="info">
            <a [routerLink]="['/profile']" class="d-block">
                {{ user?.name }}
            </a>
        </div>
    </div>

    <!-- <div class="form-inline">
        <app-sidebar-search></app-sidebar-search>
    </div> -->

    <!-- Sidebar Menu -->
    <nav class="mt-2" style="overflow-y: hidden">
        <ul
            class="nav nav-pills nav-sidebar flex-column"
            data-widget="treeview"
            role="menu"
            data-accordion="false"
        >
            <app-menu-item
                *ngFor="let item of menu"
                [menuItem]="item"
            ></app-menu-item>
        </ul>
    </nav>
</div>
