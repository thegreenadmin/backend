<div class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1 class="m-0 text-dark">Dashboard</h1>
            </div>
            <!-- /.col -->
            <!-- <div class="col-sm-6">
                <ol class="breadcrumb float-sm-right">
                    <li class="breadcrumb-item"><a href="#">Home</a></li>
                    <li class="breadcrumb-item active">Dashboard v1</li>
                </ol>
            </div> -->
            <!-- /.col -->
        </div>
        <!-- /.row -->
    </div>
    <!-- /.container-fluid -->
</div>
<!-- /.content-header -->

<!-- Main content -->
<section class="content">
    <div class="container-fluid">
        <!-- Small boxes (Stat box) -->
        <div class="row" *ngIf="data">
            <div class="col-lg-4 col-6" [routerLink]="['/users']">
                <!-- small box -->
                <div class="small-box bg-info">
                    <div class="inner">
                        <h3>{{data?.total_users}}</h3>
                        
                        <p>Total Users</p>
                    </div>
                    <div class="icon">
                        <i class="ion ion-person-add"></i>
                    </div>
                    <a class="small-box-footer" [routerLink]="['/users']"
                        >More info <i class="fas fa-arrow-circle-right"></i
                    ></a>
                </div>
            </div>
            <!-- ./col -->
            <div class="col-lg-4 col-6" [routerLink]="['/stores']">
                <!-- small box -->
                <div class="small-box bg-success">
                    <div class="inner">
                        <h3>{{data?.total_stores}}<sup style="font-size: 20px"></sup></h3>

                        <p>Total Stores</p>
                    </div>
                    <div class="icon">
                        <i class="ion ion-stats-bars"></i>
                    </div>
                    <a href="#" class="small-box-footer" [routerLink]="['/stores']"
                        >More info <i class="fas fa-arrow-circle-right"></i
                    ></a>
                </div>
            </div>
            <!-- ./col -->
            <div class="col-lg-4 col-6" [routerLink]="['/orders']">
                <!-- small box -->
                <div class="small-box bg-warning">
                    <div class="inner">
                        <h3>{{data?.total_orders}}</h3>

                        <p>Total Orders</p>
                    </div>
                    <div class="icon" >
                        <i class="ion ion-bag"></i>
                    </div>
                    <a href="#" class="small-box-footer" [routerLink]="['/orders']"
                        >More info <i class="fas fa-arrow-circle-right"></i
                    ></a>
                </div>
            </div>
            <!-- ./col -->
            <!-- ./col -->
        </div>
        <!-- /.row -->
    </div>
    <!-- Main row -->
</section>
<!-- /.content -->
