<pf-dropdown hide-arrow class="user-menu">
    <div slot="button">
        <a class="nav-link">
            <img
                [src]="user?.image?.dynamic_url"
                class="user-image-small"
                width="25"
                height="25"
                alt="User Image"
                rounded
            >
        </a>
    </div>
    <div slot="menu">
        <li class="user-header bg-primary">

            <img [src]="
                (user?.image?.dynamic_url) ?
                (user?.image?.dynamic_url) :
                'assets/img/default-profile.png'
                " class="user-image-big" width="90" height="90" alt="User Image">

            <p>
                <span>{{ user?.name }}</span>
                <!-- <small>
                    <span class="mr-2">Member since</span>
                    <span>{{ formatDate(user.createdAt) }}</span>
                </small> -->
            </p>
        </li>
        <!-- Menu Footer-->
        <li class="user-footer">
            <a [routerLink]="['/profile']" class="btn btn-default btn-flat">
                Profile
            </a>
            <a style="margin-left: 7px; height: 38px;" [routerLink]="['/changepassword']" class="btn btn-default btn-flat col-md-4">
                <div style="font-size: 12px; margin-top: -6px; padding: 0; font-weight: 450;">Change Password</div>
            </a>
            <a (click)="logout()" class="btn btn-default btn-flat float-right">
                Sign out
            </a>
        </li>
    </div>
</pf-dropdown>
