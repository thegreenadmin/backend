<section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Claim Details</h1>
        </div>
        <div class="col-sm-6 d-flex">
          <button class="btn btn-danger ml-auto" (click)="deleteClaim()">Delete Claim</button>
      </div>
        <div class="col-sm-6">
        </div>
      </div>
    </div>
    <!-- /.container-fluid -->
  </section>
  
  <!-- Main content -->
  <section class="content">
    <!-- Default box -->
    <div class="overlay-spinner" *ngIf="isLoading" >
      <!-- *ngIf="isLoading" -->
      <mat-spinner></mat-spinner>
    </div>
  
    <form class="container-fluid">
      <div class="card">
        <div class="card-body">
          <div class="row">
  
  
            <div class="col-12">
              <div class="row" *ngIf="claimDetails">
                <div class="col-12">
                  <h2>User Details</h2>
                </div>
                <div class="col-md-6  mt-1">
                  <div class="key">First Name</div>
                  <input class="form-control" type="text" [value]="claimDetails.user.first_name" readonly>
                </div>
      
                <div class="col-md-6 mt-1">
                  <div class="key">Last Name</div>
                  <input class="form-control" type="text" [value]="claimDetails.user.last_name" readonly>
                </div>
      
                <div class="col-md-6 mt-2">
                  <div class="key">Email</div>
                  <input class="form-control" type="email" [value]="claimDetails.user.email" readonly>
                </div>
      
                <div class="col-md-6 mt-2">
                  <div class="key">Dialing Code</div>
                  <input class="form-control" type="text" [value]="claimDetails.user.phone_code" readonly>
                </div>
      
                <div class="col-md-6 mt-2">
                  <div class="key">Phone</div>
                  <input class="form-control" type="tel" [value]="claimDetails.user.phone" readonly>
                </div>


                <div class="col-12 mt-3">
                  <h2>Store Details</h2>
                </div>
                <div class="col-md-6  mt-1">
                  <div class="key">Name</div>
                  <input class="form-control" type="text" [value]="claimDetails.store.store_name" readonly>
                </div>
      
                <div class="col-md-6 mt-1">
                  <div class="key">EIN</div>
                  <input class="form-control" type="text" [value]="claimDetails.store_ein" readonly>
                </div>
      
                <div class="col-md-6 mt-2">
                  <div class="key">Email</div>
                  <input class="form-control" type="text" [value]="claimDetails.store.store_email" readonly>
                </div>
      
                <div class="col-md-6 mt-2">
                  <div class="key">Dialing Code</div>
                  <input class="form-control" type="text" [value]="claimDetails.store.store_phone_code" readonly>
                </div>
      
                <div class="col-md-6 mt-2">
                  <div class="key">Phone</div>
                  <input class="form-control" type="tel" [value]="claimDetails.store.store_phone" readonly>
                </div>

                <div class="col-12 mt-3 d-flex justify-content-end" *ngIf="claimDetails.claim_status == 'new' || claimDetails.claim_status == 'pending'">
                  <button class="btn btn-success" (click)="approveClaim()">Approve Claim</button>
                  <button class="btn ml-3 btn-danger" (click)="declineClaim()">Decline Claim</button>
  
                </div>
      
              </div>

              

            </div>
  
            
          </div>
        </div>
      </div>
  
      
  
    </form>
  
    <!-- /.card -->
  </section>
  <!-- /.content -->
